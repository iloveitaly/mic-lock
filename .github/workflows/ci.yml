name: CI

on:
  push:
    branches:
      - main
      - gha
      - template-sync
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          experimental: true

      - name: Lint
        run: just lint

      - name: Test
        run: just test

      - name: Build
        run: just build
